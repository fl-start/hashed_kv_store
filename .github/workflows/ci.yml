name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pure-Dart package: analyze + unit/integration tests on every desktop
  # architecture we support (Linux, Windows, macOS ARM64).
  analyze-and-test:
    name: dart test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x64
          - ubuntu-24.04-arm    # Linux ARM64
          - windows-latest      # Windows x64
          - windows-11-arm      # Windows ARM64
          - macos-latest        # macOS ARM64 (Apple Silicon)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Analyze
        run: dart analyze --fatal-infos lib test

      - name: Test
        run: dart test

  # On-device integration tests validate the isolate + file IO path on a real
  # Android emulator.
  android-integration:
    name: integration test (android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: example
          script: flutter test integration_test

  # On-device integration tests on an iOS simulator (also exercises macOS).
  ios-integration:
    name: integration test (ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Boot an available iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available on this runner:"
            xcrun simctl list devices
            exit 1
          fi
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Run integration tests on simulator
        working-directory: example
        run: flutter test integration_test -d ${{ steps.sim.outputs.udid }}

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@latest validate kv-store --strict
